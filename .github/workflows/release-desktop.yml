name: Release Desktop App

# 手动触发：在 Actions 页面点 "Run workflow"，填一个 tag（如 desktop-v0.2.0）。
# 三平台各自构建桌面安装包并上传到对应 GitHub Release：
#   mac 同时出 arm64(Apple Silicon) 与 x64(Intel) 两个 dmg / win exe / linux AppImage。
# 当前为未签名版（desktop/package.json 里 mac.identity=null）。要启用 mac 签名/公证：
#   1) 去掉 desktop/package.json 的 "identity": null
#   2) 在仓库 Secrets 加 CSC_LINK / CSC_KEY_PASSWORD / APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID
#   下面的步骤已透传这些 env，有就自动签、没有就出未签名版。
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. desktop-v0.2.0)"
        required: true
        default: "desktop-v0.2.0"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            builder_flag: "--mac --arm64 --x64"
            plat: mac
          - os: windows-latest
            builder_flag: "--win"
            plat: win
          - os: ubuntu-latest
            builder_flag: "--linux"
            plat: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 引擎 + 官网 Studio（桌面 App 通过 extraResources 打包 ../dist 与 ../website/dist）
      - name: Install root deps & build engine
        run: |
          npm ci
          npm run build
      - name: Build Studio (website/dist)
        run: npm run build:studio

      # 闸 1：打包前确认前端产物完整（防 #81：website/dist 缺失/空就被打包）
      - name: Verify frontend before packaging
        run: node scripts/verify-frontend.mjs website/dist

      - name: Install desktop deps
        working-directory: desktop
        run: npm ci

      - name: Build desktop installer
        working-directory: desktop
        run: npx electron-builder ${{ matrix.builder_flag }} --publish never
        env:
          # 有证书/公证 Secrets 时 electron-builder 自动签名+公证；没有就出未签名版
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # 闸 2：确认前端真的被打进产物（electron-builder 会顺带产出 *-unpacked / mac .app，
      #       直接进去看 resources/app/website/dist 在不在；不在就 fail，绝不发白屏包）
      - name: Verify frontend landed in packaged app
        run: node scripts/verify-frontend.mjs --packed desktop/release

      # 为本平台产物生成 SHA256 校验和（mac 用 shasum，linux/win-gitbash 用 sha256sum）
      - name: Generate checksums
        shell: bash
        working-directory: desktop/release
        run: |
          shopt -s nullglob
          files=( *.dmg *.exe *.AppImage )
          if [ ${#files[@]} -gt 0 ]; then
            if command -v sha256sum >/dev/null 2>&1; then HASH="sha256sum"; else HASH="shasum -a 256"; fi
            $HASH "${files[@]}" > "SHA256SUMS-${{ matrix.plat }}.txt"
            cat "SHA256SUMS-${{ matrix.plat }}.txt"
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          draft: false
          # 桌面包始终标记为 latest：官网「下载桌面客户端」走 /releases/latest，
          # 引擎(npm)版本另发 v* release 时用 --latest=false，避免抢走下载入口。
          make_latest: "true"
          fail_on_unmatched_files: false
          body: |
            ## 安装 / Install

            下载对应平台的安装包并安装：

            - **macOS (Apple Silicon)** — `*-arm64.dmg`
            - **macOS (Intel)** — `*.dmg`（不带 arm64 的那个）
            - **Windows** — `*Setup*.exe`
            - **Linux** — `*.AppImage`

            桌面端**自带引擎与 Node，双击即用，无需 `npm i -g agency-orchestrator`**。只有想在终端用 `ao` 命令或接进脚本 / CI 时才需要安装 CLI。

            > 不想装、嫌下面的签名提示麻烦？**用网页版也行**：`npm i -g agency-orchestrator && ao web`（功能和桌面版一样，key 只存本机），或直接打开 https://ao.aiolaola.com 演示体验。

            ### macOS 提示「已损坏，无法打开」？
            未签名版的正常提示，不是真的损坏。先把 App 拖进「应用程序」，再在「终端」运行：

                sudo xattr -cr "/Applications/Agency Orchestrator.app"

            之后双击即可打开。

            ### Windows 弹「Windows 已保护你的电脑」？
            点「更多信息」→「仍要运行」。

            ### 校验完整性（可选）
            每个平台附带 `SHA256SUMS-<平台>.txt`，对照下载文件：

                shasum -a 256 <下载的文件名>

            > 当前为未签名版（无 Apple 公证 / Windows 签名），以上提示在后续签名版本中会自动消失。
          files: |
            desktop/release/*.dmg
            desktop/release/*.dmg.blockmap
            desktop/release/*.exe
            desktop/release/*.exe.blockmap
            desktop/release/*.AppImage
            desktop/release/SHA256SUMS-*.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
