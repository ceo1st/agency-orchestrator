name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # 确认构建出的 dist/cli.js 实现了源码声明的所有命令（防 #80：发布陈旧 dist）
      - name: Verify CLI command parity
        run: node scripts/verify-cli.mjs

      - name: Clone agency-agents-zh for tests
        run: git clone --depth 1 https://github.com/jnMetaCode/agency-agents-zh.git

      - name: Run tests
        run: npm test
