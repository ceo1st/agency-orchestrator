name: "Content Pipeline"
description: "From a topic to a publish-ready piece — research, draft, brand review, final edit."

agents_dir: "agency-agents"

llm:
  provider: "deepseek"
  model: "deepseek-chat"

concurrency: 2

inputs:
  - name: topic
    description: "What the piece is about"
    required: true
    default: "How small teams can adopt AI without rebuilding their whole stack"

steps:
  - id: research
    role: "marketing/marketing-social-media-strategist"
    task: |
      Research the topic and produce a tight content brief for: {{topic}}

      Output (markdown):
      - Target audience & the one job they're hiring this content for
      - 3 angles that would actually get shared (with why)
      - Key points / data the piece must cover
      - Recommended format, length, and primary channel
    output: brief

  - id: draft
    role: "marketing/marketing-content-creator"
    task: |
      Write the full piece from this brief. Be specific and concrete — no filler, no AI clichés.

      {{brief}}
    output: draft
    depends_on: [research]

  - id: brand_review
    role: "marketing/marketing-growth-hacker"
    task: |
      Review the draft for clarity, hook strength, and shareability. Give concrete edits
      (not vague praise): fix the opening if weak, tighten any flabby sections, sharpen the CTA.

      {{draft}}
    output: review
    depends_on: [draft]

  - id: final_edit
    role: "marketing/marketing-content-creator"
    task: |
      Apply the review notes and deliver the final, publish-ready piece.

      Draft: {{draft}}
      Review notes: {{review}}
    output: final
    depends_on: [brand_review]
