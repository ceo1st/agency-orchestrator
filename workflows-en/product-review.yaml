name: "Product / PRD Review"
description: "Review a PRD from product, user, and prioritization angles, then synthesize feedback."

agents_dir: "agency-agents"

llm:
  provider: "deepseek"
  model: "deepseek-chat"

concurrency: 2

inputs:
  - name: prd_content
    description: "The PRD text to review"
    required: true
    default: |
      # PRD: One-click share for workflow run results
      ## Background: after a run, users can only copy-paste text; formatting is lost.
      ## Goal: generate a shareable web link for a run (per-step output, collapsible).
      ## Scope: 1) CLI prompts to "generate share link" after a run; 2) upload to object storage → short link; 3) read-only web view, collapsible per step.
      ## Non-goals: no comments/collaboration; no permission system (link = access).
      ## Metrics: share conversion (run → link) > 20%; opens per shared link.

steps:
  - id: pm_review
    role: "product/product-manager"
    task: |
      Review this PRD as a product manager: is the problem real and well-scoped? Call out
      gaps, risky assumptions, missing edge cases, and anything that should be cut or split.

      {{prd_content}}
    output: pm_review

  - id: user_lens
    role: "design/design-ux-researcher"
    task: |
      Review the same PRD from the user's perspective: where will real users get confused
      or drop off? What user evidence would de-risk this? Suggest concrete UX questions to test.

      {{prd_content}}
    output: user_lens

  - id: prioritize
    role: "product/product-sprint-prioritizer"
    task: |
      Given the PRD and both reviews, propose a lean v1 scope and what to defer, with reasoning.

      PRD: {{prd_content}}
      PM review: {{pm_review}}
      User lens: {{user_lens}}
    output: prioritization
    depends_on: [pm_review, user_lens]

  - id: synthesize
    role: "product/product-feedback-synthesizer"
    task: |
      Synthesize everything into one decision-ready review: top risks, recommended v1 scope,
      open questions, and a clear go / revise recommendation.

      {{pm_review}}
      {{user_lens}}
      {{prioritization}}
    output: final_review
    depends_on: [prioritize]
