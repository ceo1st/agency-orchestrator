name: "Real LLM Test"
description: "2-step workflow to verify real LLM integration"

agents_dir: "../agency-agents-zh"

llm:
  provider: "ollama"
  model: "llama3"
  max_tokens: 512
  timeout: 120000
  retry: 1

concurrency: 2

inputs:
  - name: topic
    description: "Topic to analyze"
    required: true

steps:
  - id: analyze
    role: "product/product-manager"
    task: |
      用中文简要分析以下主题的市场前景（100字以内）：

      {{topic}}
    output: analysis

  - id: plan
    role: "engineering/engineering-software-architect"
    task: |
      基于以下分析，用中文给出 3 条技术建议（每条一句话）：

      {{analysis}}
    depends_on: [analyze]
